<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Orders Demo</title></head>
<body style="font-family:system-ui;background:#111;color:#eee">
<div style="max-width:820px;margin:40px auto;background:#151515;padding:20px;border-radius:16px">
<h1>Orders Demo (order_uid)</h1>
<form onsubmit="event.preventDefault();const id=document.getElementById('oid').value.trim();if(id)location.href='/order/'+encodeURIComponent(id)">
<input id="oid" placeholder="Введите order_uid" style="padding:8px 10px;border-radius:12px;border:1px solid #333;background:#000;color:#fff;width:70%">
<button style="padding:8px 12px;border-radius:12px;border:0;background:#444;color:#fff">Показать JSON</button>
</form>
<p>API вернёт JSON из кэша/БД, а сервис обновляет кэш из NATS Streaming.</p>
</div>
</body></html>
